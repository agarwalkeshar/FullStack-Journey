<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        /* img {
            filter: blur(5px);
        } */
        .img1{
            filter: brightness(190%);
        }
        .img2{
            filter: contrast(200%);
        }
        .img3{
            filter:grayscale(100%);
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="img1" src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
        <img class="img2" src="https://variety.com/wp-content/uploads/2024/07/Shah-Rukh-Khan.jpg">
        <img class="img3" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQXoMf0NrnFliyG61VjWJvTNzy2M7JV8wgqfU7B3R-1Nw&s=10">
    </div>
</body>
</html>
