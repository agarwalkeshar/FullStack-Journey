<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Multicolor Website</title>
    <!-- The nav bar should stick to the screen and all the elements should pass through it and the bottom-right icon should be fixed at its position-->
    <style>
        body {
            background-color: black;
            min-height: 100vh;
        }

        :root {
            --color: rgb(248, 157, 248);
            /* --seccolor: ; */
            --container-color: rgb(99, 165, 99);
            --box1-bgcolor: rgb(236, 139, 155);
            --box2-bgcolor: rgb(13, 124, 228);
        }

        * {
            margin: 0;
            padding: 0;
        }

        .nav {
            top: 0px;
            left: 0;
            height: 65px;
            position: fixed;
            z-index: 100;
            width: 100%;
            background-color: var(--color);
        }

        .container {
            display: flex;
            background-color: var(--container-color);
            border: 2px solid var(--container-color);
            margin-top: 80px;
            margin-left: 10px;
            margin-right: 10px;
            height: 350px;
        }

        .box-1 {
            background-color: var(--box1-bgcolor);
            width: 300px;
            height: 300px;
            margin-left: 350px;
            margin-top: 20px;
        }

        .box-2 {
            background-color: var(--box2-bgcolor);
            width: 300px;
            height: 300px;
            margin-left: 100px;
            margin-top: 20px;
        }

        .title {
            margin-left: 380px;
            margin-top: 50px;
            font-size: 40px;
            border: 1px solid white;
            color: white;
            padding-left: 150px;
            padding-top: 40px;
            padding-bottom: 40px;
            width: 600px;
            align-items: center;
            border-radius: 50px;
        }

        .footer {
            height: 65px;
            background-color: white;
            margin-top: 300px;
        }

        .icon {
            position: fixed;

            bottom: 20px;
            right: 20px;

            width: 60px;
            height: 60px;

            border-radius: 50%;

            background: orange;
        }
    </style>
</head>

<body>
    <header>
        <nav class="nav"></nav>
    </header>
    <main>
        <div class="container">
            <div class="box-1"></div>
            <div class="box-2"></div>
        </div>
    </main>
    <section>
        <p class="title">Welcome to this Sigma Web Developemnt Express</p>
    </section>
    <footer>
        <div class="footer"></div>
        <span class="icon"></span>
    </footer>

</body>

</html>
