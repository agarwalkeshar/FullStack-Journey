<!--Semantic tags are very important for SEO and to understand the overall structure of the web page. They offer a way to structure our HTML in a meaningful manner, making our website more accessible and easier to understand.
Search engines gets impressed by looking at the structure-->

<!--Semantic Tags add meaning to our HTML. They tell both the browser and the developer what kind of content is being presented.

Semantic Tags:-
1. <header>:- Used to represent the top section of a web page often containing headings, logos and navigation
2. <nav>:- Signifies a navigation menu on a web page
3. <article>:- Indicates a self contained piece of content, such as a blog post or news article
4. <secion>:- Represents a themantic grouping of content on a web page
5. <aside>:- Typically used for sidebars or content that is tangentially related to the main content
6. <footer>:- reperensts the footer of the web page, usually containing copyright information and contact details
7. <figure> and <figcaption>:- Used for embedding images, diagrams or charts, along with a caption
8. <main>:- Signifies the main content area of a web page.
9. <time>:- Used to represent time-related information, like dates and times.
-->
