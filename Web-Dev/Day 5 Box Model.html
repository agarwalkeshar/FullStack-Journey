<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box {
            margin: 0;
            padding: 0;
        }

        .box {
            background-color: aqua;
        }

        .box1 {
            color: yellow;
            padding: 10px;
            margin: 25px;
            border: 2px solid blue;
            height: 100px;

            /* box-sizing: border-box calculates the height of the box by combining the border and padding.So, if the height is 100, it is the total of padding + margin + height. If we are not adding the (box-sizing: border-box) property the total height of the box will include the height + padding + border + margin. */
            box-sizing: border-box;
        }

        .box2 {
            color: red;
            padding: 10px;
            margin: 25px;
            border: 2px solid black;
            height: 100px;

            /* margin-collapse states that if two elements or components have margin assigned to them and their margins are overlap, then the greatest/maximum margin amonst the two will be selected */
        }
    </style>
</head>

<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I am another box</div>
</body>
</html>
