<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <style>
        .container{
            background-color: rgb(0, 106, 106);
            height: 80vh;
            width: 30vw;
        }
        .box{
            width: 34px;
            height: 45px;
            /* background-color: aqua; */

            /* animation: name duration timing-function delay iteration-count direction fill-mode; */

            /* animation: kesharKaAnimation;
            animation-duration: 3s;
            animation-iteration-count: 2;
            animation-timing-function: cubic-bezier(0.76, -0.03, 0, 0.98);
            animation-delay: 1s;
            animation-direction: reverse;
            animation-play-state: running; */

            /* shorthand for animation */
            animation: kesharKaAnimation 3s cubic-bezier(0.76, -0.03, 0, 0.98) 1s 1 forwards ;

            /* to add more than 1 animation, add them after a coma */
            animation: kesharKaAnimation 3s cubic-bezier(0.76, -0.03, 0, 0.98) 1s 1 forwards, Keshar2 3s ease-in-out 3s 1 ;
        }

        @keyframes kesharKaAnimation {
            from{
                background-color: red;
            }
            to{
                background-color: yellow;
                transform: translate(1000px);
            }
        }
        @keyframes Keshar2 {
            0%{
                transform: rotate(100deg);
            }
            20%{
                transform: rotate(200deg);
            }
            50%{
                transform: rotate(220deg);
            }
            80%{
                transform: rotate(300deg);
            }
            100%{
                transform: rotate(310deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            Box
        </div>
    </div>
</body>
    
</html>
