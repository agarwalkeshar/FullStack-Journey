<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block elements - HTML</title>
    <link rel="stylesheet" href="style 3.1.css">
</head>
<body>
    <p>Hey I am para</p>
    <!-- p is a block element-->

    <a href="www.google.com">Google</a>
    <!-- <a> is an inline element-->

    <div>I am a block element</div>
    <span>I am span and I am inline </span><a href="">yes, he is inline</a>
</body>
</html>

<!--Inline elements = Inline elements do not start on a new line and only take up as much width as possible -->

<!--Block elements = Block elements start on a new line and take up the entire width of their container by default. They occupy the whole line, making the next element appear on the next line-->
