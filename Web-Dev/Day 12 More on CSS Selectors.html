<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More on CSS Selectors</title>
    <style>
        /* .box:first-child{
            background-color: red;
        } */
        /* .box::first-line{
            color: yellow;
        } */
        /* .boxes * {
            color: blue;
            border: 2px solid black;
        }

        /* attribute selector:- [data-color="primary"] and grouping of all the values
        p, a, .box, [data-color="primary"] {
            padding-top: 45px;

        } */

        /* nth-child selector
        .box:nth-child(even){
            background-color: blue;
        } */

        /* nth-last-child selector
        .box:nth-last-child(1){
            background-color: blanchedalmond;
        } */

        /* pseudo elements */
        .boxes::before{
            content: "Keshar is good";
        }

        .boxes::after{
            content: "Keshar is too good";
        }

        ::selection{
            background-color: black;
            color: aqua;
        }

        .box::first-letter{
            color: peru;
            font-size: 45px;
        }

        input::placeholder{
            color: rgb(169, 169, 173);
        }
    </style>
</head>

<body>
    <div class="boxes">
        <div data-color="primary" class="box">I am first box</div>
        <div class="box">Hey, I am a box</div>
        <div class="box">Hey, I am a box</div>
        <input type="text" placeholder="Type your name here">
    </div>
</body>

</html>
