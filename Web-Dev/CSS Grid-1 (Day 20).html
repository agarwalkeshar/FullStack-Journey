<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid-1</title>
    <style>
        .container {
            height: 130vh;
            width: 80vw;
            border: 2px solid black;
            display: grid;
            /* grid-template-columns: [pehla] 120px [doosra] 100px [t];
            grid-template-rows: 100px 100px 100px; */

            /* It is used to distribute the size/width of the web page according to our needs*/
            /* grid-template-columns: 1fr 2fr 1fr; */
            /* grid-template-columns: repeat(4, 1fr); */
            grid-template-columns: repeat(4, minmax(100px, 1fr));

            /* gap: 30px; */
            row-gap: 10px;
            column-gap: 35px;
            justify-items: center;
            align-items: center;

            /* It is used to b */
            /* place-content: center; */
        }

        .item {
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }

        .item-4 {
            /* grid-row: 1/2;
            grid-column: pehla/t; */
        }

        /* To overlap item-1 and item-4 */
        .item-1 {
            /* grid-row: 1/2;

                /* Both of the above and below methods works same, we can use either of them */

            /* grid-row-start: 1;
            grid-row-end: 2;
            grid-column: 1/2; */
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item">5</div>
    </div>
</body>

</html>


<!-- justify-items and align-items are used when we want to arrange the elements within a cell.
 align-content and justify-content are used when our container is big and our grid is smaller and we have to arrange it within the container
  -->
