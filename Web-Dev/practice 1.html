<!-- Create a vertically aligned form asking for name, city, and pincode of a user-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice - 1</title>
    <style>
        form{
            border: 2px solid rgb(211, 175, 121);
            width: 500px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 450px;
            margin-top: 100px;
            gap: 40px;
            padding: 80px 20px;
            background-color:blanchedalmond;
        }
    </style>
</head>

<body>
    <form>
        <div>
            <label>Enter your name:</label>
            <input type="text" autofocus>
        </div>
        <div>
            <label>Enter your city:</label>
            <input type="text" autofocus>
        </div>
        <div>
            <label>Enter your pincode:</label>
            <input type="text" autofocus>
        </div>

    </form>
</body>

</html>
