<!--Entities are a crucial part of HTML markup language. Entities are used to represent special characters in a format that the browser can understand. They start with an ampersand (&) and end with a semicolon (;).

Why use entities?

1. Reserved Characters: Chararcters like <, > and & are reserved in HTML
2. Special symbols:- For symbols like Copyright or mathematical symbols.
3. Non-Breaking spaces:- To create white spaces that won't break into a new line.

Common Entities
1. &lt; for <
2. &gt; for >
3. &amp; for &
4. &nbsp; for a non-breaking space 
4. &copy; for © 
-->

<!--Quotation Tags:- The use of quotation tags is common in textual content. HTML provides specific tags to handle this: <blockquote> for block quotations and <q> for inline quotations.
   Quotation Tags provide semantic meaning to our quotations, making it easier for search engines to understand the context of the content
   
   <blockquote> Tag syntax:- <blockquote cite="source-url">Quotation text here</blockquote>

   <q> Tag syntax:- <q cite="source-url">Quotation text here </q>
    
   HTML Code Tag
   The <code> tag is a semantic HTML tag that's used for displaying code snippets. It can be used both inline and within a block-level element like <pre>.

    1.It provides Semantic meaning
    2. Makes it easier and more readable 
    3. Easier to style and highlight with CSS or JavaScript libraries like Prism
    
    Syntax:- <code> Enter your code here </code>

    Character Set
    
    A character set is a set of symbols and characters that a computer uses to represent text. Specifying the correct character set ensures that text is displayed properly across different browsers and platforms.

    Using the correct character set is crucial for 1. Accurate Rendering 2. Multi-language support 3. Data Integrity.

    Common character sets
    1. UTF-8: Universal Character Set 8. It can only represent a character in the Unicode standard.
    2. ISO-8859: Western Apphabet
    3. ASCII:- American standard code for information exchange

    Canvas 

    The <canvas> element serves as a container for graphics, which can be rendered via scripting. Essentially, it offers a drawing area for visual content.

    It can be used for Graphical representation, dynamically update visual content and elements, and improve interactivity (It involves JavaScript)

    Syntax:- <canvas id="myCanvas" width="200" height="100"> </canvas>
