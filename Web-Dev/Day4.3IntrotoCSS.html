<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <style>
        div{
            color: red;
            background-color: yellow;
            /* here color and background-color is selector and red and yellow are declarations*/

        }
    </style>
</head>
<body>
    <div>
        Hey I am Keshar and today we are starting CSS
    </div>

    <div>
        I am good
    </div>
    <span>
        I am also good
    </span>
</body>
</html>
<!--CSS stands for Cascading Style Sheet. It is a stylesheet which is used to describe the visual representaion of a web page written in HTML. CSS adds style to the strcture -->
