<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio, Video and Media</title>
    <link rel="stylesheet" href="">
</head>
<body>
    <video src="Cat.mp4" height="450" controls></video>
<!--Video element attributes:-
1. autoplay:- automatically starts playing the video when the page loads
2. loop: repeats the video once it ends
3. muted:- Mutes the video by default
4. poster:- specifies an image to be displayed before the video starts playing (thumbnail)
-->
    <audio src=""></audio>
    <!--Audio element attributes:-
1. autoplay:- automatically starts playing the video when the page loads
2. loop: repeats the video once it ends
3. muted:- Mutes the video by default
4. preload:- Specifies if and how the audio should be loaded when the page loads('auto', 'metadata', 'none')
-->

<svg height="100" width="100">
    <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="red"></circle>
</svg>
<iframe width="560" height="315" src="https://www.youtube.com/embed/XZwBNDGuWGU?si=CwogXB-c1OyTNG-q" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
