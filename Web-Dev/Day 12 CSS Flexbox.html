<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flexbox</title>
    <style>
        .container{
            border: 2px solid rgb(172, 139, 97);
            display: flex;
            height: 80vh;

            /* justify-content arranges or aligns the items in a horizontal manner*/
            /* justify-content: center; */

            /* align-items arranges or aligns the items in a vertical manner.
            It is used when we have only 1 line of data or content.*/
            align-items: center;

            /* flex-direction:column; */
            flex-wrap: wrap;
            /* aligns the content on the page according to our need and the space.
            It is used when we have multiple lines of data or content and it gets wrap. */

            /* to use align-self we don't need to use align-content if there is only 1 line of content */
            /* align-content:flex-start; */

            /* there is no justify-items in flexbox */

            /* syntax:- flex-flow: <flex-direction> <flex-wrap>*/
            flex-flow: row wrap;
            gap: 30px;
            row-gap: 10px;
            column-gap: 5px;

            /* shorthand for row-gap and column-gap */
            /* gap: 10px 30px */
        }
        .item{
            /* flex-grow: 1; */
            height: 92px;
            width: 92px;
            background-color:blanchedalmond;
            border: 2px solid black;
            /* margin: 4px; */
        }
        /* These can be used to oder/ arrange the items according to the order */
        .order-1{
            order: 1;
        }
        .order-2{
            order: 2;
        }
        .order-3{
            order: 3;
        }
        .item1{
            /* flex-grow: 5; */
            /* flex-shrink: 2; */
            align-self:flex-end;
        }
        .item3{
            align-self:flex-end;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="item item1">1</div>
            <div class="item item2">2</div>
            <div class="item item3">3</div>
            <!-- Since item 4 has order-1 it will appear at the last. The higher the order, the last it gets. If it has the last order them it will appear at the first. -->
            <div class="item order-1">4</div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
            <div class="item"></div>
    </main>
</body>
</html>

<!-- If the flex-direction is row, then the main-axis will be row and the perpendicular axis will be column and in that case "justify-content" and "align-items" will arrange the items across the main-axis. So, if the flex-direction is row then the main axis will be row and if the flex-direction is column then the main axis will be column. -->
