<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lists</title>
    <style>
        nav ul li{
            /* Instead of bullet points, which appear for ul by default, we can use list-style to change the style. Instead of bullet points, we can also add emojis. */
            list-style: devanagari;  
            list-style-type:circle;
            background-color: yellow;
            list-style-position:inside ;
            border: 2px solid black;
            list-style: disc inside url("/Users/kesharagrawal/Desktop/FullStack-Journey/FullStack-Journey/Web-Dev/swan.jpeg");
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
<!-- element.style mai jo bhi CSS mention hoga vo inline CSS hoga -->
