<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form - lets learn it</title>
</head>
<body>
    <h1>Form to apply for Sigma Web Dev course - TA</h1>
    <form action="post">
        <div>
            <!--div is a block element-->
            <label for="username">Enter your username:</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>

            <!--id is a unique identifier for an element-->

        </div>
        <div>
            <input type="radio" id="Female" name="gender" value="Female">
            <label for="Female">Female</label>

            <input type="radio" id="Male" name="gender" value="Male">
            <label for="Male">Male</label>
        </div>

        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
        </div>

        <div>
            <label for="comment">Enter your comment here...</label><br>
            <textarea id="comment" name="comment" rows="4" cols="50"></textarea>
        </div>

        <div>
            <select name="fruits">
                <option value="apple">Apple</option>
                <option value="banana">Banana</option>
                <option value="cherry">Cherry</option>
            </select>
        </div>
    </form>

    <!-- form asks us what is our action? Is it get or post -->

    <!--GET Request - It is a very simple request, and it is used to inform the server or hit the server-->

    <!--POST Request - It is used when we want to give/present a huge amount of data -->

    <!--Required Key - It states that an element is required to be filled; if it is missing, the form won't get submitted -->

    <!--Pattern Expressions can be used to allow the user to input according to the specified pattern
        eg:- patterns = "[a-zA-Z0-9]" -->

</body>
</html>
