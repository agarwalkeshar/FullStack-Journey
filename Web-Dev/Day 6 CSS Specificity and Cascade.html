<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity</title>
    <style>
        /* specificity = 1 */
        h1{
            color: green;
        }
        /* specificity = 10 */
        .cred{
            color: red;
        }
        /* specificity = 10 */
        .cpurple{
            color: purple;
        }
        /* specificity = 10 */
        .yellow{
            color: yellow;
        }
        /* specificity = 1 + 10 */
        h1.yellow{
            color: yellow;
        }
        /* The specificity of this selector is 1 + 10 + 10 + 10 + 10 */
        a.harryclass.rohan-class[href]:hover{
            color: blueviolet;
        }
        /* Order of specificity:-
        Inline Style > ID Selector > Class or Attribute Selector > Element Selector > Universal Selector
        */

        /* Attribute Selector */
        /* specificity = 10 */
        /* [data-x=a]{
            background-color: red;
        } */
    </style>
</head>
<body>
    <div>
        <h1 class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
    </div>
</body>
</html>

<!-- The Cascade Algorithm has 4 satges

1. Positiona nd order of appearance
2. Specificity
3. Origin
4. Importance (adding !important will have higher priority and it will override inline styles also) 
-->
<!-- To Calculate Specificity, assign values to each part of the selector
 1. Universal selector: 0
 2. Element sleector and pseudo-elements: 1
 3. class selectors, attribute selectors and pseudo-classes: 10
 4. ID selectors: 100
 5. inline styles: 1000
 -->
