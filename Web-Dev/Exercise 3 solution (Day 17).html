<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: rgb(239, 233, 233);
        }
        .card{
            margin-left: 530px;
            margin-top: 10px;
            background-color: white;
            width: 380px;
            height: 550px;
            border-radius: 13px;
            margin-top: 20px;
        }
        .img{
            height: 260px;
            width: 360px;
            border-radius: 24px;
            padding: 10px;
        }
        .keyword{
            margin-left: 28px;
            display: inline;
            border-radius: 15px;
            border: 1px solid rgb(235, 234, 234);
            padding: 2px 10px;
            background-color: rgb(255, 254, 254);
            font-family: Arial, Helvetica, sans-serif;
            font-size: 15px;
            color: rgb(185, 185, 185);
        }
        .keyword2{
            margin-left: 8px;
        }
        .title{
            margin-left: 28px;
            font-family: Arial, Helvetica, sans-serif;
            font-style: normal;
            font-weight: 10;
        }
        .desc{
            margin-left: 28px;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(185, 185, 185);
        }
        .cont{
            display: inline;
            border-radius: 20px;
        }
        .info{
            color: rgb(76, 133, 208);
            background-color: rgb(204, 225, 247);
            padding: 15px 30px;
            border-radius: 30px;
            width: 70px;
            margin-left: 120px;
            margin-top: 30px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <img class="img" src="boat.webp">
        <p class="keyword">Nature</p>
        <p class="keyword keyword2">Lake</p>

        <h2 class="title">Lago di Braies</h2>

        <p class="desc">Lorem ipsum dolor sit amet consectetur adipisicing elit. Amet repellat odit esse, ullam veritatis cumque deserunt recusandae suscipit vero officiis corporis ad sequi.</p>

        <span class="cont">
            <p class="info">Read More</p>
        </span>
        
    </div>
</body>
</html>
