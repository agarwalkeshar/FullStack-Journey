<body>
    <!-- Factorial of a number is the multiplication of all the numbers between 1 and the number itself. -->
    <!-- Exercise - Write a program to calculate the factorial of a number using reduce() and for loop.-->
    <!-- Find factorial of 6 -->
    <script>
        // using reduce() function
        let a = 6;

        function factorial(number){
            let arr = Array.from(Array(number+1).keys());
            // console.log(arr.slice(1,));
            let c = arr.slice(1,).reduce((a,b)=>{
                return a*b
            })
            // console.log(c);
            return c;
        }

        // using for loop

        function factFor(number){
            let fact = 1;
            for (let index = 1; index <= number; index++) {
                fact = fact * index;
                
            }
            return fact;
        }
        console.log(factorial(a));
        console.log(factFor(a));
    </script>
</body>
